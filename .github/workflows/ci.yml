name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - run: uv python install 3.12
      - run: uv pip install -e ".[dev]" --python 3.12
      - run: uv run --python 3.12 ruff check src/ tests/
      - run: uv run --python 3.12 ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - run: uv python install 3.12
      - run: uv pip install -e ".[dev]" --python 3.12
      - run: uv run --python 3.12 mypy src/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - run: uv python install ${{ matrix.python-version }}
      - run: uv pip install -e ".[dev]" --python ${{ matrix.python-version }}
      - run: uv run --python ${{ matrix.python-version }} pytest tests/unit/ -x -q --no-header --override "tool.pytest.ini_options.addopts="
        env:
          PYTHONDONTWRITEBYTECODE: 1
